<!doctype html>
<html>

<head>
    <title>Stone Paper Scissors</title>
</head>

<body>
    <h1>Stone Paper Scissors</h1>
    <p>Welcome to the game!</p>
    <p>Choose your move:</p>
    <button onclick="playGame('Stone')">Stone</button>
    <button onclick="playGame('Paper')">Paper</button>
    <button onclick="playGame('Scissors')">Scissors</button>
    <button onclick="
        score.wins=0;
        score.losses=0;
        score.tie=0;
    ">Reset Score</button>
    <script>
        const score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            tie: 0
        };

        function playGame(PlayerMove) {
            const computerMove = pickComputerMove();
            let result;
            if (PlayerMove === computerMove) {
                result = "It's a tie!";
            } else if (PlayerMove === 'Stone' && computerMove === 'Scissors' ||
                PlayerMove === 'Paper' && computerMove === 'Stone' ||
                PlayerMove === 'Scissors' && computerMove === 'Paper') {
                result = "You win!";
            } else {
                result = "Computer wins!";
            }

            if (result == "It's a tie!") {
                score.tie += 1;
            } else if (result == "Computer wins!") {
                score.losses += 1;
            } else {
                score.wins += 1;
            }

            localStorage.setItem('score', JSON.stringify(score));
            
            alert(`You chose ${PlayerMove}, Computer chose ${computerMove}. ${result}
Wins: ${score.wins} Losses: ${score.losses} Tie: ${score.tie}`
            );
        }
        alert(`You chose ${PlayerMove}, Computer chose ${computerMove}. ${result}`);
        function pickComputerMove() {
            const randomNumber = Math.random();
            if (randomNumber >= 0 && randomNumber < 0.33) {
                return 'Stone';
            } else if (randomNumber >= 0.33 && randomNumber < 0.66) {
                return 'Paper';
            } else {
                return 'Scissors';
            }
        }
    </script>
</body>

</html>
